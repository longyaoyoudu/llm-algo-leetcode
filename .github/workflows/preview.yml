name: Preview VitePress site

on:
  push:
    branches:
      - "feat/**"
      - "docs/**"
      - "fix/**"
      - "chore/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: ./docs
        run: npm ci

      - name: Sanitize branch name
        id: sanitize
        shell: bash
        run: |
          safe_name="${GITHUB_REF_NAME//\//-}"
          echo "safe_name=$safe_name" >> "$GITHUB_OUTPUT"

      - name: Build with VitePress
        working-directory: ./docs
        run: npm run docs:build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v6
        with:
          name: vitepress-preview-${{ steps.sanitize.outputs.safe_name }}
          path: docs/.vitepress/dist
          retention-days: 7

      - name: Preview summary
        run: |
          echo "Preview build finished for branch: ${{ github.ref_name }}"
          echo "Download the artifact named: vitepress-preview-${{ steps.sanitize.outputs.safe_name }}"
